<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Protocole 7J — Human Matrix</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0a0a0a; color: #f3f4f6; min-height: 100vh; overflow-x: hidden; }
    .hidden { display: none !important; }
    .card { background: #141414; border-radius: 14px; padding: 1.25rem; border: 1px solid #1f2937; }
    .btn { padding: .6rem 1.25rem; border-radius: 10px; font-weight: 600; font-size: .875rem; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: .5rem; transition: .15s; }
    .btn-primary { background: #10b981; color: black; }
    .btn-outline { background: transparent; border: 1.5px solid #333; color: #f3f4f6; }
    .btn-outline:hover { border-color: #10b981; color: #10b981; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-sm { padding: .4rem .85rem; font-size: .8rem; }
    .btn-lg { padding: .75rem 1.75rem; font-size: 1rem; }
    input, select { width: 100%; padding: .65rem .85rem; border-radius: 10px; border: 1px solid #333; background: #1a1a2e; color: white; font-size: .9rem; outline: none; }
    input:focus { border-color: #10b981; }
    label { display: block; font-size: .8rem; color: #9ca3af; margin-bottom: .3rem; }
    .badge { display: inline-flex; padding: .15rem .6rem; border-radius: 999px; font-size: .7rem; font-weight: 600; background: rgba(16,185,129,.15); color: #34d399; }
    .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; padding: .75rem 1.25rem; border-radius: 12px; background: #141414; border: 1px solid #333; color: white; z-index: 9999; animation: slideIn .3s ease; max-width: 360px; font-size: .875rem; }
    @keyframes slideIn { from { transform: translateX(100%) } to { transform: translateX(0) } }
    .page { display: none; max-width: 600px; margin: 0 auto; padding: 1rem 1rem 5rem; }
    .page.active { display: block; }
    .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #141414; border-top: 1px solid #1f2937; display: flex; justify-content: space-around; padding: .4rem 0; z-index: 50; }
    .tab-btn { background: none; border: none; color: #6b7280; font-size: .7rem; cursor: pointer; padding: .3rem .6rem; display: flex; flex-direction: column; align-items: center; gap: .1rem; }
    .tab-btn.active { color: #10b981; }
    .progress-bar { height: 4px; background: #1f2937; border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: #10b981; border-radius: 2px; transition: width .5s; }
    .pole-card { border-radius: 14px; padding: 1.25rem; text-align: center; border: 1px solid; }
    .score-btn { width: 36px; height: 36px; border-radius: 50%; border: 2px solid #333; background: transparent; color: white; cursor: pointer; font-weight: 600; }
    .score-btn.selected { border-color: #10b981; background: rgba(16,185,129,.2); }
  </style>
</head>
<body><div id="app"></div>
<script>
// ========================== STATE ==========================
const S = (k,d) => { try { return JSON.parse(localStorage.getItem('p7j_'+k))||d } catch { return d } }
const SS = (k,v) => localStorage.setItem('p7j_'+k, JSON.stringify(v))

const QUESTIONS = [
  {id:1,pole:'Djism',q:"Je me réveille avec une énergie suffisante."},
  {id:2,pole:'Djism',q:"Mon sommeil est réparateur."},
  {id:3,pole:'Djism',q:"Je maintiens un effort physique sans m'épuiser."},
  {id:4,pole:'Djism',q:"Je prends soin de mon corps."},
  {id:5,pole:'Aql',q:"Je me concentre longtemps sans distraction."},
  {id:6,pole:'Aql',q:"Je prends des décisions rapidement."},
  {id:7,pole:'Aql',q:"Je contrôle mes pensées et évite les ruminations."},
  {id:8,pole:'Aql',q:"J'apprends facilement de nouvelles choses."},
  {id:9,pole:'Nafs',q:"Je résiste aux tentations."},
  {id:10,pole:'Nafs',q:"Je reconnais mes erreurs."},
  {id:11,pole:'Nafs',q:"Je peux attendre pour une récompense."},
  {id:12,pole:'Nafs',q:"Je maîtrise ma colère."},
  {id:13,pole:'Qalb',q:"Je ressens une paix intérieure."},
  {id:14,pole:'Qalb',q:"Je suis connecté à plus grand que moi."},
  {id:15,pole:'Qalb',q:"Je connais ma direction de vie."},
]

const MISSIONS = {
  1:[{p:'Djism',t:'Marche consciente',d:'Marche 20 min dehors sans téléphone.'},{p:'Aql',t:'Nettoyage mental',d:'Écris tout ce qui te traverse l\'esprit 5 min.'},{p:'Nafs',t:'Défi',d:'Résiste à ta tentation n°1 aujourd\'hui.'},{p:'Qalb',t:'Gratitude',d:'Écris 3 choses pour lesquelles tu es reconnaissant.'}],
  2:[{p:'Djism',t:'Étirements',d:'10 min d\'étirements au réveil.'},{p:'Aql',t:'Focus 25 min',d:'Travaille sans interruption.'},{p:'Nafs',t:'Dire non',d:'Refuse poliment ce que tu ne veux pas faire.'},{p:'Qalb',t:'Lecture',d:'Lis un passage qui élève ton âme.'}],
  3:[{p:'Djism',t:'Hydratation',d:'Bois 2 verres d\'eau dès le réveil.'},{p:'Aql',t:'Monotâche',d:'Termine une tâche avant d\'en commencer une autre.'},{p:'Nafs',t:'Levé immédiat',d:'Lève-toi dans les 5 secondes au réveil.'},{p:'Qalb',t:'Connexion',d:'Envoie un message sincère à quelqu\'un.'}],
  4:[{p:'Djism',t:'Respiration',d:'Inspire 4s, bloque 7s, expire 8s. 5 cycles.'},{p:'Aql',t:'Apprends',d:'Regarde une vidéo éducative 10 min.'},{p:'Nafs',t:'Range',d:'Range ton espace 15 min.'},{p:'Qalb',t:'Méditation',d:'5 min en silence. Observe tes pensées.'}],
  5:[{p:'Djism',t:'Exercice',d:'15 min d\'exercice : pompes, squats.'},{p:'Aql',t:'Planifie',d:'Écris les 3 priorités de demain.'},{p:'Nafs',t:'Journal',d:'Note chaque tentation à laquelle tu as résisté.'},{p:'Qalb',t:'Pardon',d:'Pardonne à quelqu\'un dans ton cœur.'}],
  6:[{p:'Djism',t:'Marche rapide',d:'30 min de marche rapide.'},{p:'Aql',t:'Solutions',d:'Écris 3 solutions à un problème.'},{p:'Nafs',t:'Routine',d:'Suis ta routine parfaitement.'},{p:'Qalb',t:'Sadaqah',d:'Donne sans rien attendre en retour.'}],
  7:[{p:'Djism',t:'Bilan physique',d:'Comment te sens-tu par rapport au jour 1 ?'},{p:'Aql',t:'Bilan mental',d:'Qu\'as-tu appris sur ton esprit ?'},{p:'Nafs',t:'Bilan discipline',d:'Quelle force as-tu découverte ?'},{p:'Qalb',t:'Célébration',d:'Célèbre ta semaine !'}],
}

const BRIEFINGS = {
  1:'https://docs.google.com/uc?export=download&id=1PAE4l2EbOR3R4qXOJc77BMFmlfi10SB6',
  2:'https://docs.google.com/uc?export=download&id=1pZ6D4N7HymSyOP79As68_e3YksKO6Ka1',
  3:'https://docs.google.com/uc?export=download&id=1roKE7vhMFK5rg1EAYD08Ub5xGLAXRDrs',
  4:'https://docs.google.com/uc?export=download&id=1MeTG1IQxQnZFoM7V3_Jy10MuJju5naLB',
  5:'https://docs.google.com/uc?export=download&id=1XwGkxlR7UNFVFSssxmDrPY2vEFs6pouF',
  6:'https://docs.google.com/uc?export=download&id=1Lj8IsbjD0z-ReBWqGhsZw3A3hCiVvmYn',
  7:'https://docs.google.com/uc?export=download&id=1vuH6Y5c1eceXLhSdeHdFJEvcZQAVI9a1',
}

let state = { user: S('user',null), scores: null, packActive: S('pack',false), currentDay: S('day',1), progress: S('progress',{}), diagAnswers: {} }
function save() { SS('user',state.user); SS('pack',state.packActive); SS('day',state.currentDay); SS('progress',state.progress) }

function toast(msg) { const t=document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300)},2500) }

// ========================== ROUTING ==========================
let cp = 'home'
function nav(p) { cp = p; window.location.hash = p; renderPage() }
window.addEventListener('hashchange', () => { cp = location.hash.slice(1)||'home'; renderPage() })

// ========================== RENDER ==========================
function render() {
  if (!state.user) { renderAuth(); return }
  const icons = { home:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1"/></svg>', test:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>', cal:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>', rep:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg>' }
  document.getElementById('app').innerHTML = `
    <div style="max-width:600px;margin:0 auto;padding:0 0 5rem">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:.75rem 1rem;background:#0a0a0a;border-bottom:1px solid #1f2937;position:sticky;top:0;z-index:10">
        <div style="display:flex;align-items:center;gap:.5rem"><span style="color:#10b981;font-weight:800;font-size:1.1rem">▲</span><span style="font-weight:600;font-size:.9rem">Protocole 7J</span></div>
        <div style="display:flex;align-items:center;gap:.5rem"><span style="font-size:.75rem;color:#6b7280">${state.user?.name||''}</span><button class="btn btn-outline btn-sm" onclick="logout()" style="padding:.2rem .5rem;font-size:.7rem">✕</button></div>
      </div>
      <div id="pc" class="page active" style="padding:1rem"></div>
      <div class="tab-bar">
        <button class="tab-btn ${cp==='home'?'active':''}" onclick="nav('home')">${icons.home}<span>Accueil</span></button>
        <button class="tab-btn ${cp==='diag'?'active':''}" onclick="nav('diag')">${icons.test}<span>${state.scores?'Profil':'Test'}</span></button>
        <button class="tab-btn ${cp==='proto'?'active':''}" onclick="nav('proto')">${icons.cal}<span>Protocole</span></button>
        <button class="tab-btn ${cp==='report'?'active':''}" onclick="nav('report')">${icons.rep}<span>Rapport</span></button>
      </div>
    </div>`
  renderPage()
}

function renderPage() {
  const el = document.getElementById('pc')
  if (!el) return
  const pages = { home: renderHome, diag: renderDiag, proto: renderProto, report: renderReport }
  if (pages[cp]) pages[cp]()
}

// ========================== AUTH ==========================
function renderAuth() {
  document.getElementById('app').innerHTML = `
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem">
      <div class="card" style="max-width:380px;width:100%;padding:2rem;text-align:center">
        <div style="font-size:2.5rem;font-weight:800;color:#10b981;margin-bottom:.25rem">▲</div>
        <h1 style="font-size:1.3rem;font-weight:700;margin-bottom:.2rem">Protocole 7J</h1>
        <p style="font-size:.85rem;color:#6b7280;margin-bottom:1.5rem">Human Matrix — Reprends le contrôle</p>
        <div><div style="margin-bottom:.75rem"><label>Ton prénom</label><input type="text" id="auth-name" placeholder="Ex: Jacques" value="${S('lastName','')}" maxlength="30"></div>
        <button class="btn btn-primary btn-lg" style="width:100%" onclick="handleLogin()">Commencer</button>
        <p style="margin-top:.75rem;font-size:.75rem;color:#4b5563">🔒 Données stockées uniquement sur cet appareil</p></div>
      </div>
    </div>`
  document.getElementById('auth-name')?.addEventListener('keydown', e => { if(e.key==='Enter') handleLogin() })
}

function handleLogin() {
  const name = document.getElementById('auth-name')?.value.trim()
  if (!name) { toast('Entre ton prénom'); return }
  state.user = { name, email: name.toLowerCase()+'@local', created_at: new Date().toISOString() }
  state.scores = S('scores', null)
  SS('lastName', name)
  save()
  toast('Bienvenue '+name+' ! 🤲')
  render()
}

function logout() { state.user = null; save(); render() }

// ========================== HOME ==========================
function renderHome() {
  const el = document.getElementById('pc'); if(!el) return
  const scores = state.scores
  el.innerHTML = `
    <div style="text-align:center;padding:2rem 0">
      <h1 style="font-size:1.5rem;font-weight:700;letter-spacing:1px">MENTAL NATION</h1>
      <p style="color:#6b7280;font-size:.85rem;margin-top:.3rem">Protocole 7 jours de restauration humaine</p>
      <div style="width:40px;height:3px;background:#10b981;margin:.75rem auto;border-radius:2px"></div>
    </div>
    ${scores ? `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1rem">
        ${pCard('Djism','💪','#ef4444',scores.Djism)}
        ${pCard('Aql','🧠','#3b82f6',scores.Aql)}
        ${pCard('Nafs','🔥','#f59e0b',scores.Nafs)}
        ${pCard('Qalb','💚','#10b981',scores.Qalb)}
      </div>
      ${!state.packActive ? `<button class="btn btn-primary btn-lg" style="width:100%" onclick="nav('proto')">Démarrer le protocole</button>` : `<button class="btn btn-primary btn-lg" style="width:100%" onclick="nav('proto')">Jour ${state.currentDay}/7</button>`}
    ` : `<button class="btn btn-primary btn-lg" style="width:100%" onclick="nav('diag')">Faire le test diagnostic</button>`}
    <p style="text-align:center;font-size:.75rem;color:#4b5563;margin-top:1rem">4 piliers : Corps · Esprit · Âme · Cœur</p>`
}

function pCard(n,i,c,s) { const u=s<50; return `<div class="pole-card" style="border-color:${c}20;background:${c}08"><div style="font-size:1.5rem">${i}</div><div style="font-size:.8rem;font-weight:600;margin:.2rem 0;color:${c}">${n}</div><div style="font-size:1.5rem;font-weight:700;color:${c}">${Math.round(s)}%</div><div style="font-size:.65rem;color:#6b7280">${u?'⚠ Instable':'✅ Stable'}</div></div>` }

// ========================== DIAGNOSTIC ==========================
function renderDiag() {
  const el = document.getElementById('pc'); if(!el) return
  if (state.scores) {
    el.innerHTML = `<h2 style="font-size:1.2rem;font-weight:700;text-align:center;margin:1rem 0">Ton profil</h2>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem">${pCard('Djism','💪','#ef4444',state.scores.Djism)}${pCard('Aql','🧠','#3b82f6',state.scores.Aql)}${pCard('Nafs','🔥','#f59e0b',state.scores.Nafs)}${pCard('Qalb','💚','#10b981',state.scores.Qalb)}</div>
      <button class="btn btn-outline btn-sm" style="margin:1rem auto;display:block" onclick="retakeDiag()">Refaire le test</button>`
    return
  }
  state.diagAnswers = {}
  let html = `<h2 style="font-size:1.2rem;font-weight:700;text-align:center;margin:1rem 0">Diagnostic</h2><p style="text-align:center;font-size:.85rem;color:#6b7280;margin-bottom:1rem">Note chaque question de 1 à 10</p><div style="font-size:.8rem;color:#6b7280;text-align:center;margin-bottom:1rem" id="dp">0/15</div>`
  QUESTIONS.forEach((q,i) => {
    html += `<div class="card" style="margin-bottom:.6rem;${i===0?'':'display:none'}" data-q="${i}">
      <p style="font-weight:500;margin-bottom:.75rem">${q.q}</p>
      <div style="display:flex;gap:.35rem;justify-content:center;flex-wrap:wrap">
        ${Array.from({length:10},(_,s)=>`<button class="score-btn" onclick="selDiag(${i},${s+1})" style="${state.diagAnswers[i]===s+1?'border-color:#10b981;background:rgba(16,185,129,.2)':''}">${s+1}</button>`).join('')}
      </div>
      <div style="display:flex;justify-content:space-between;font-size:.7rem;color:#4b5563;margin-top:.35rem"><span>Pas du tout</span><span>Totalement</span></div>
      <div style="display:flex;justify-content:space-between;margin-top:.75rem">
        ${i>0?`<button class="btn btn-outline btn-sm" onclick="prevQ(${i})">←</button>`:'<span></span>'}
        ${i<14?`<button class="btn btn-primary btn-sm" id="nxt-${i}" disabled onclick="nextQ(${i})">→</button>`:`<button class="btn btn-primary btn-sm" id="sub-diag" disabled onclick="submitDiag()">Résultats</button>`}
      </div>
    </div>`
  })
  el.innerHTML = html
}

function selDiag(i,s) {
  state.diagAnswers[i]=s
  const nxt = document.getElementById('nxt-'+i); if(nxt) nxt.disabled=false
  const sub = document.getElementById('sub-diag'); if(sub) sub.disabled=Object.keys(state.diagAnswers).length<15
  document.getElementById('dp').textContent=Object.keys(state.diagAnswers).length+'/15'
}
function nextQ(i) { document.querySelector(`[data-q="${i}"]`).style.display='none'; document.querySelector(`[data-q="${i+1}"]`).style.display='block' }
function prevQ(i) { document.querySelector(`[data-q="${i}"]`).style.display='none'; document.querySelector(`[data-q="${i-1}"]`).style.display='block' }
function submitDiag() {
  const scores = {Djism:[],Aql:[],Nafs:[],Qalb:[]}
  QUESTIONS.forEach((q,i) => { scores[q.pole].push((state.diagAnswers[i]||5)*10) })
  const r = { Djism: scores.Djism.reduce((a,b)=>a+b,0)/scores.Djism.length, Aql: scores.Aql.reduce((a,b)=>a+b,0)/scores.Aql.length, Nafs: scores.Nafs.reduce((a,b)=>a+b,0)/scores.Nafs.length, Qalb: scores.Qalb.reduce((a,b)=>a+b,0)/scores.Qalb.length }
  state.scores = r; SS('scores', r)
  toast('✅ Diagnostic terminé !'); nav('home')
}
function retakeDiag() { state.scores=null; SS('scores',null); nav('diag') }

// ========================== PROTOCOL ==========================
function renderProto() {
  const el = document.getElementById('pc'); if(!el) return
  if (!state.packActive) {
    el.innerHTML = `<div style="text-align:center;padding:2rem 0"><h2 style="font-size:1.3rem;font-weight:700">Pack 7 Jours</h2><p style="color:#6b7280;font-size:.85rem;margin:.5rem 0 1.5rem">Débloque le protocole complet pour transformer tes 4 piliers.</p>
      <div class="card" style="text-align:center;border:1px solid #10b98140"><ul style="list-style:none;font-size:.85rem;line-height:2;margin-bottom:1.25rem"><li>✅ 7 briefings audio</li><li>✅ 28 missions ciblées</li><li>✅ Suivi de progression</li><li>✅ Bouton SOS</li></ul>
      <button class="btn btn-primary btn-lg" onclick="activatePack()">Activer le protocole</button><p style="font-size:.75rem;color:#4b5563;margin-top:.75rem">Gratuit — Soutiens le projet si tu le souhaites 🤲</p></div></div>`
    return
  }
  const day = state.currentDay, missions = MISSIONS[day]||MISSIONS[1]
  const p = state.progress[day]||{}, completed = p.c||[], briefingDone = p.b||false, sosCount = p.s||0
  const total = missions.length, done = completed.length, pct = total>0?Math.round(done/total*100):0

  el.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:.5rem 0">
      <h2 style="font-size:1.1rem;font-weight:700">Jour ${day}/7</h2>
      <div style="display:flex;align-items:center;gap:.5rem"><span style="font-size:.75rem;color:#6b7280">${done}/${total}</span><div class="progress-bar" style="width:60px"><div class="progress-fill" style="width:${pct}%"></div></div></div></div>
    <div style="display:flex;gap:.35rem;margin-bottom:1rem;overflow-x:auto;padding:.25rem 0">
      ${Array.from({length:7},(_,i)=>{const d=i+1, all=(state.progress[d]?.c||[]).length>=4; return `<button class="btn btn-sm ${d===day?'btn-primary':all?'btn-primary':'btn-outline'}" onclick="goDay(${d})" style="min-width:36px;padding:.35rem">${d}</button>`}).join('')}
    </div>
    ${BRIEFINGS[day]?`<div class="card" style="margin-bottom:.75rem"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-weight:600;font-size:.9rem">🎧 Briefing Jour ${day}</span>${!briefingDone?`<button class="btn btn-primary btn-sm" onclick="markBrief(${day})">✅ Écouté</button>`:`<span style="color:#10b981;font-size:.8rem">✅ Briefing complété</span>`}</div><audio controls preload="none" style="width:100%;margin-top:.5rem;border-radius:8px"><source src="${BRIEFINGS[day]}" type="audio/mpeg"></audio></div>`:''}
    <h3 style="font-size:.95rem;font-weight:600;margin-bottom:.5rem">Missions du jour</h3>
    ${missions.map(m=>{const isDone=completed.includes(m.t);return `<div class="card" style="margin-bottom:.5rem;${isDone?'opacity:.5':''}"><div style="display:flex;justify-content:space-between;align-items:start;gap:.5rem"><div><span class="badge" style="font-size:.65rem;background:${m.p==='Djism'?'rgba(239,68,68,.15)':m.p==='Aql'?'rgba(59,130,246,.15)':m.p==='Nafs'?'rgba(245,158,11,.15)':'rgba(16,185,129,.15)'};color:${m.p==='Djism'?'#fca5a5':m.p==='Aql'?'#93c5fd':m.p==='Nafs'?'#fbbf24':'#34d399'}">${m.p}</span><div style="font-weight:600;font-size:.9rem;margin-top:.2rem">${m.t}</div><div style="font-size:.8rem;color:#6b7280">${m.d}</div></div><button class="btn btn-sm ${isDone?'btn-outline':'btn-primary'}" ${isDone?'disabled':''} onclick="compMission(${day},'${m.t}')">${isDone?'✅':'✓'}</button></div></div>`}).join('')}
    <div style="text-align:center;margin-top:1rem;padding:.5rem"><p style="font-size:.75rem;color:#6b7280;margin-bottom:.35rem">SOS — Appel à la force</p><button class="btn btn-danger btn-sm" onclick="triggerSos(${day})" style="border-radius:50%;width:48px;height:48px;font-size:1.2rem;padding:0">${sosCount>0?sosCount:'SOS'}</button><p style="font-size:.7rem;color:#4b5563;margin-top:.35rem">Utilisé ${sosCount} fois aujourd'hui</p></div>`
}

function goDay(d) { state.currentDay=d; save(); renderProto() }
function activatePack() { state.packActive=true; state.currentDay=1; state.progress={}; save(); toast('✅ Protocole activé !'); nav('proto') }
function compMission(d,t) {
  if(!state.progress[d]) state.progress[d]={c:[]}
  if(!state.progress[d].c.includes(t)) state.progress[d].c.push(t)
  state.currentDay=Math.max(state.currentDay,d); save(); toast('✅ Mission accomplie ! 🎯'); renderProto()
}
function markBrief(d) { if(!state.progress[d]) state.progress[d]={c:[]}; state.progress[d].b=true; save(); toast('✅ Briefing écouté !'); renderProto() }
function triggerSos(d) { if(!state.progress[d]) state.progress[d]={c:[]}; state.progress[d].s=(state.progress[d].s||0)+1; save(); toast('🤲 Qu\'Allah te renforce. Tu es plus fort que tu ne le penses.'); renderProto() }

// ========================== REPORT ==========================
function renderReport() {
  const el = document.getElementById('pc'); if(!el) return
  if(!state.scores||!state.packActive) { el.innerHTML='<p style="text-align:center;color:#6b7280;padding:2rem">Fais d\'abord le diagnostic et active le protocole.</p>'; return }
  let tm=0, td=0, ts=0
  for(let d=1;d<=7;d++){const p=state.progress[d];tm+=4;td+=p?.c?.length||0;ts+=p?.s||0}
  const rate=tm>0?Math.round(td/tm*100):0
  el.innerHTML = `<h2 style="font-size:1.2rem;font-weight:700;text-align:center;margin:1rem 0">Rapport</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1rem">
      <div class="card" style="text-align:center"><div style="font-size:1.5rem;font-weight:700;color:#10b981">${td}</div><div style="font-size:.75rem;color:#6b7280">Missions faites</div></div>
      <div class="card" style="text-align:center"><div style="font-size:1.5rem;font-weight:700;color:#fbbf24">${rate}%</div><div style="font-size:.75rem;color:#6b7280">Complétion</div></div>
      <div class="card" style="text-align:center"><div style="font-size:1.5rem;font-weight:700;color:#fca5a5">${ts}</div><div style="font-size:.75rem;color:#6b7280">SOS utilisés</div></div>
      <div class="card" style="text-align:center"><div style="font-size:1.5rem;font-weight:700;color:#93c5fd">${tm}</div><div style="font-size:.75rem;color:#6b7280">Total missions</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem">${pCard('Djism','💪','#ef4444',state.scores.Djism)}${pCard('Aql','🧠','#3b82f6',state.scores.Aql)}${pCard('Nafs','🔥','#f59e0b',state.scores.Nafs)}${pCard('Qalb','💚','#10b981',state.scores.Qalb)}</div>
    <p style="text-align:center;font-size:.85rem;color:#6b7280;margin:1.5rem 0;line-height:1.6">"${state.user?.name}, ce protocole est un premier pas.<br>La véritable transformation est entre tes mains.<br>Qu'Allah bénisse ton chemin. 🤲"</p>`
}

// ========================== INIT ==========================
state.scores = S('scores', null)
render()
</script>
</body></html>
