    </div>`
}
function pCard(n,i,c,s) { const u=s<50; return `<div class="pole-card" onclick="nav('manifest')" style="border-color:${c}20;background:${c}08"><div style="font-size:1.5rem">${i}</div><div style="font-size:.8rem;font-weight:600;margin:.2rem 0;color:${c}">${n}</div><div style="font-size:1.5rem;font-weight:700;color:${c}">${Math.round(s)}%</div><div style="font-size:.65rem;color:#6b7280">${u?'⚠ Instable':'✅ Stable'}</div></div>` }

// ========================== DIAGNOSTIC ==========================
function renderDiag() {
  const el=document.getElementById('pc'); if(!el) return
  if(state.scores){
    el.innerHTML=`<h2 style="font-size:1.2rem;font-weight:700;text-align:center;margin:1rem 0">Ton profil</h2><div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem">${pCard('Djism','💪','#ef4444',state.scores.Djism)}${pCard('Aql','🧠','#3b82f6',state.scores.Aql)}${pCard('Nafs','🔥','#f59e0b',state.scores.Nafs)}${pCard('Qalb','💚','#10b981',state.scores.Qalb)}</div>
    <p style="text-align:center;font-size:.8rem;color:#6b7280;margin:.75rem 0">Clique sur un pilier pour lire sa description.</p>
    <button class="btn btn-outline btn-sm" style="margin:0 auto;display:block" onclick="retakeDiag()">Refaire le test</button>`; return
  }
  state.diagAnswers={}
  let html=`<h2 style="font-size:1.2rem;font-weight:700;text-align:center;margin:1rem 0">Diagnostic</h2><p style="text-align:center;font-size:.85rem;color:#6b7280;margin-bottom:1rem">Note chaque question de 1 à 10</p><div style="font-size:.8rem;color:#6b7280;text-align:center;margin-bottom:1rem" id="dp">0/15</div>`
  QUESTIONS.forEach((q,i)=> {
    html+=`<div class="card" style="margin-bottom:.6rem;${i===0?'':'display:none'}" data-q="${i}"><p style="font-weight:500;margin-bottom:.75rem">${q.q}</p>
      <div style="display:flex;gap:.35rem;justify-content:center;flex-wrap:wrap">${Array.from({length:10},(_,s)=>`<button class="score-btn" onclick="selDiag(${i},${s+1})" style="${state.diagAnswers[i]===s+1?'border-color:#10b981;background:rgba(16,185,129,.2)':''}">${s+1}</button>`).join('')}</div>
      <div style="display:flex;justify-content:space-between;font-size:.7rem;color:#4b5563;margin-top:.35rem"><span>Pas du tout</span><span>Totalement</span></div>
      <div style="display:flex;justify-content:space-between;margin-top:.75rem">
        ${i>0?`<button class="btn btn-outline btn-sm" onclick="prevQ(${i})">←</button>`:'<span></span>'}
        ${i<14?`<button class="btn btn-primary btn-sm" id="nxt-${i}" disabled onclick="nextQ(${i})">→</button>`:`<button class="btn btn-primary btn-sm" id="sub-diag" disabled onclick="submitDiag()">Résultats</button>`}
      </div></div>`
  })
  el.innerHTML=html
}
function selDiag(i,s){state.diagAnswers[i]=s;const n=document.getElementById('nxt-'+i);if(n)n.disabled=false;const sb=document.getElementById('sub-diag');if(sb)sb.disabled=Object.keys(state.diagAnswers).length<15;document.getElementById('dp').textContent=Object.keys(state.diagAnswers).length+'/15'}
function nextQ(i){document.querySelector(`[data-q="${i}"]`).style.display='none';document.querySelector(`[data-q="${i+1}"]`).style.display='block'}
function prevQ(i){document.querySelector(`[data-q="${i}"]`).style.display='none';document.querySelector(`[data-q="${i-1}"]`).style.display='block'}
function submitDiag(){const s={Djism:[],Aql:[],Nafs:[],Qalb:[]};QUESTIONS.forEach((q,i)=>{s[q.pole].push((state.diagAnswers[i]||5)*10)});const r={Djism:s.Djism.reduce((a,b)=>a+b,0)/s.Djism.length,Aql:s.Aql.reduce((a,b)=>a+b,0)/s.Aql.length,Nafs:s.Nafs.reduce((a,b)=>a+b,0)/s.Nafs.length,Qalb:s.Qalb.reduce((a,b)=>a+b,0)/s.Qalb.length};state.scores=r;SS('scores',r);toast('✅ Diagnostic terminé !');nav('home')}
function retakeDiag(){state.scores=null;SS('scores',null);nav('diag')}

// ========================== MANIFESTE ==========================
function renderManifest() {
  const el=document.getElementById('pc'); if(!el) return
  el.innerHTML = `<h2 style="font-size:1.2rem;font-weight:700;text-align:center;margin:1rem 0">📖 Les 4 Piliers</h2>
    <p style="text-align:center;font-size:.85rem;color:#6b7280;margin-bottom:1rem">Le manifeste de l'humain — Corps, Esprit, Âme, Cœur</p>
    ${MANIFEST.map(p => `
      <div class="manifest-pillar" style="border-color:${p.color}30;background:${p.color}08">
        <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:.5rem">
          <div class="pillar-icon">${p.icon}</div>
          <div><div class="pillar-name" style="color:${p.color}">${p.name}</div><div class="pillar-arabic">${p.arabic} — ${p.sub}</div></div>
        </div>
        <div class="pillar-desc">${p.desc.replace(/\n/g,'<br>')}</div>
      </div>
    `).join('')}
    <p style="text-align:center;font-size:.8rem;color:#4b5563;margin:.75rem 0;line-height:1.5">Ces 4 piliers sont interconnectés.<br>Quand tu nourris l'un, tu fortifies les autres.</p>`
}

// ========================== PROTOCOL ==========================
function renderProto() {
  const el=document.getElementById('pc'); if(!el) return
  if(!state.scores){ el.innerHTML="<div style=text-align:center;padding:3rem 1rem><div style=font-size:3rem;margin-bottom:.5rem>\u{1f4cb}</div><h2 style=font-size:1.2rem;font-weight:700;margin-bottom:.5rem>Test requis</h2><p style=color:#6b7280;font-size:.85rem;line-height:1.6;margin-bottom:1.5rem>Tu dois d'abord faire le test diagnostic.</p><button class=btn btn-primary onclick=\"nav('diag')\">Faire le test</button></div>"; return }
  if(!state.packActive){
    el.innerHTML=`<div style="text-align:center;padding:2rem 0"><h2 style="font-size:1.3rem;font-weight:700">Protocole 30 Jours</h2><p style="color:#6b7280;font-size:.85rem;margin:.5rem 0 1.5rem">Un mois pour transformer tes 4 piliers. Briefings quotidiens, missions ciblées, suivi pas à pas.</p>
      <div class="card" style="text-align:center;border:1px solid #10b98140"><ul style="list-style:none;font-size:.85rem;line-height:2;margin-bottom:1.25rem"><li>✅ 30 briefings écrits</li><li>✅ 120 missions ciblées</li><li>✅ 4 semaines progressives</li><li>✅ Bilan final</li></ul>
      <button class="btn btn-primary btn-lg" onclick="activatePack()">Lancer le protocole</button><p style="font-size:.75rem;color:#4b5563;margin-top:.75rem">Gratuit — Soutiens le projet si tu le souhaites 🤲</p></div></div>`; return
  }
  const d=state.currentDay, missions=MISSIONS[d]||MISSIONS[1]
  const p=state.progress[d]||{}, completed=p.c||[], briefingDone=p.b||false, sosCount=p.s||0
  const total=missions.length, done=completed.length, pct=total>0?Math.round(done/total*100):0
  
  // Calcul du nombre de jours total faits
  let totalDone=0; for(let i=1;i<=30;i++){const g=state.progress[i];totalDone+=g?.c?.length||0}

  el.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:.5rem 0">
      <h2 style="font-size:1.1rem;font-weight:700">Jour ${d}/30</h2>
      <div style="display:flex;align-items:center;gap:.5rem"><span style="font-size:.75rem;color:#6b7280">${done}/${total}</span><div class="progress-bar" style="width:60px"><div class="progress-fill" style="width:${pct}%"></div></div></div>
    </div>
    <div style="display:flex;gap:.3rem;margin-bottom:1rem;overflow-x:auto;padding:.25rem 0;flex-wrap:wrap">
      ${Array.from({length:30},(_,i)=>{const x=i+1,al=(state.progress[x]?.c?.length||0)>=4;return `<button class="day-btn ${x===d?'active':al?'done':''}" onclick="goDay(${x})">${x}</button>`}).join('')}
    </div>
    ${BRIEFINGS[d]?`<div class="card" style="margin-bottom:.75rem;background:rgba(16,185,129,.04);border-color:rgba(16,185,129,.15)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem">
        <span style="font-weight:600;font-size:.85rem;color:#34d399">📖 Briefing — Jour ${d}</span>
        ${!briefingDone?`<button class="btn btn-primary btn-sm" onclick="markBrief(${d})">✅ Lu</button>`:`<span style="color:#10b981;font-size:.8rem">✅ Lu</span>`}
      </div>
      <p style="font-size:.85rem;line-height:1.7;color:#d1d5db">${BRIEFINGS[d]}</p>
    </div>`:''}
    <h3 style="font-size:.95rem;font-weight:600;margin-bottom:.5rem">Missions du jour</h3>
    ${missions.map(m=>{const is=completed.includes(m.t);return `<div class="card" style="margin-bottom:.5rem;${is?'opacity:.5':''}"><div style="display:flex;justify-content:space-between;align-items:start;gap:.5rem"><div><span class="badge" style="font-size:.65rem;background:${m.p==='Djism'?'rgba(239,68,68,.15)':m.p==='Aql'?'rgba(59,130,246,.15)':m.p==='Nafs'?'rgba(245,158,11,.15)':'rgba(16,185,129,.15)'};color:${m.p==='Djism'?'#fca5a5':m.p==='Aql'?'#93c5fd':m.p==='Nafs'?'#fbbf24':'#34d399'}">${m.p}</span><div style="font-weight:600;font-size:.9rem;margin-top:.2rem">${m.t}</div><div style="font-size:.8rem;color:#6b7280">${m.d}</div></div><button class="btn btn-sm ${is?'btn-outline':'btn-primary'}" ${is?'disabled':''} onclick="compMission(${d},'${m.t}')">${is?'✅':'✓'}</button></div></div>`}).join('')}
    <div style="display:flex;justify-content:center;gap:.75rem;margin-top:1rem;padding:.5rem">
      <div style="text-align:center">
        <p style="font-size:.7rem;color:#6b7280;margin-bottom:.25rem">SOS</p>
        <button class="btn btn-danger btn-sm" onclick="triggerSos(${d})" style="border-radius:50%;width:44px;height:44px;font-size:1rem;padding:0">${sosCount>0?sosCount:'SOS'}</button>
        <p style="font-size:.65rem;color:#4b5563;margin-top:.2rem">${sosCount>0?'×'+sosCount:'Appel à la force'}</p>
      </div>
      <div style="text-align:center">
        <p style="font-size:.7rem;color:#6b7280;margin-bottom:.25rem">Progression</p>
        <div style="font-size:1.1rem;font-weight:700;color:#10b981">${totalDone}/120</div>
        <p style="font-size:.65rem;color:#4b5563;margin-top:.2rem">missions faites</p>
      </div>
    </div>`
}

function goDay(d){state.currentDay=d;save();renderProto()}
function activatePack(){state.packActive=true;state.currentDay=1;state.progress={};save();toast('✅ Protocole 30J activé !');nav('proto')}
function compMission(d,t){
  if(!state.progress[d])state.progress[d]={c:[]}
  if(!state.progress[d].c.includes(t))state.progress[d].c.push(t)
  state.currentDay=Math.max(state.currentDay,d);save();toast('✅ Mission accomplie ! 🎯');renderProto()
}
function markBrief(d){if(!state.progress[d])state.progress[d]={c:[]};state.progress[d].b=true;save();toast('✅ Briefing lu');renderProto()}
function triggerSos(d){if(!state.progress[d])state.progress[d]={c:[]};state.progress[d].s=(state.progress[d].s||0)+1;save();toast('🤲 '+randomSos());renderProto()}

// ========================== REPORT ==========================
function renderReport() {
  const el=document.getElementById('pc'); if(!el)return
  if(!state.scores||!state.packActive){el.innerHTML=`<div style="text-align:center;padding:2rem;color:#6b7280"><p>Fais d'abord le diagnostic et lance le protocole.</p><button class="btn btn-primary btn-sm" style="margin-top:.75rem" onclick="nav('diag')">Test diagnostic</button></div>`;return}
  let tm=0,td=0,ts=0
  for(let d=1;d<=30;d++){const g=state.progress[d];tm+=4;td+=g?.c?.length||0;ts+=g?.s||0}
  const r=tm>0?Math.round(td/tm*100):0
  el.innerHTML=`<h2 style="font-size:1.2rem;font-weight:700;text-align:center;margin:1rem 0">📊 Rapport 30 jours</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1rem">
      <div class="card" style="text-align:center"><div style="font-size:1.5rem;font-weight:700;color:#10b981">${td}</div><div style="font-size:.75rem;color:#6b7280">Missions sur ${tm}</div></div>
      <div class="card" style="text-align:center"><div style="font-size:1.5rem;font-weight:700;color:#fbbf24">${r}%</div><div style="font-size:.75rem;color:#6b7280">Complétion</div></div>
      <div class="card" style="text-align:center"><div style="font-size:1.5rem;font-weight:700;color:#fca5a5">${ts}</div><div style="font-size:.75rem;color:#6b7280">SOS utilisés</div></div>
      <div class="card" style="text-align:center"><div style="font-size:1.5rem;font-weight:700;color:#93c5fd">${Math.floor(td/4)}</div><div style="font-size:.75rem;color:#6b7280">Jours complétés</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem">${pCard('Djism','💪','#ef4444',state.scores.Djism)}${pCard('Aql','🧠','#3b82f6',state.scores.Aql)}${pCard('Nafs','🔥','#f59e0b',state.scores.Nafs)}${pCard('Qalb','💚','#10b981',state.scores.Qalb)}</div>
    <p style="text-align:center;font-size:.85rem;color:#6b7280;margin:1.5rem 0;line-height:1.6">"${state.user?.name}, 30 jours de travail sur toi-même.<br>Chaque pas comptait. Chaque effort avait du sens.<br>Qu'Allah bénisse ton chemin. 🤲"</p>
    <div style="text-align:center"><button class="btn btn-outline btn-sm" onclick="nav('home')">← Accueil</button></div>`
}

// ========================== INIT ==========================
state.scores=S('scores',null)
render()
</script>
</body></html>
