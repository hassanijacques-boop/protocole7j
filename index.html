    .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; padding: .85rem 1.35rem; border-radius: 14px; background: rgba(20,20,30,.95); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,.08); color: white; z-index: 9999; animation: slideUp .35s cubic-bezier(.16,1,.3,1); max-width: 360px; font-size: .875rem; box-shadow: 0 8px 32px rgba(0,0,0,.5); }
    @keyframes slideUp { from { transform: translateY(20px); opacity:0 } to { transform: translateY(0); opacity:1 } }
    
    /* === LAYOUT === */
    .page { display: none; max-width: 600px; margin: 0 auto; padding: 1rem 1rem 5.5rem; animation: fadeIn .3s ease; }
    .page.active { display: block; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px) } to { opacity:1; transform:translateY(0) } }

    .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,10,20,.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,.06); display: flex; justify-content: space-around; padding: .35rem 0 env(safe-area-inset-bottom, .35rem); z-index: 50; }

    .tab-btn.active { color: #10b981; }

    .progress-bar { height: 4px; background: rgba(255,255,255,.06); border-radius: 2px; overflow: hidden; }

    .pole-card:active { transform: translateY(-1px); }

    .glow { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
    
    /* === SOS OVERLAY === */
    .sos-overlay { position: fixed; inset:0; z-index:9998; background:rgba(0,0,0,.92); backdrop-filter:blur(12px); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:2rem; animation:sosFade .3s ease; }

    .sos-overlay .sos-close { position:absolute; top:1.5rem; right:1.5rem; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.08); color:#6b7280; width:36px; height:36px; border-radius:50%; font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .sos-overlay .sos-close:hover { background:rgba(255,255,255,.1); color:#f3f4f6; }

    .breath-circle { width:120px; height:120px; border-radius:50%; margin:0 auto 1rem; background:conic-gradient(#10b981 0deg, #059669 180deg, #10b981 360deg); display:flex; align-items:center; justify-content:center; box-shadow:0 0 40px rgba(16,185,129,.2), 0 0 80px rgba(16,185,129,.1); animation:breathAnim 8s ease-in-out 1; }
    .breath-circle-inner { width:50px; height:50px; border-radius:50%; background:#0a0a1a; display:flex; align-items:center; justify-content:center; font-size:.7rem; color:#6b7280; font-weight:500; }

    .breath-label { font-size:.9rem; font-weight:600; color:#10b981; margin-top:.5rem; }
    .breath-sub { font-size:.75rem; color:#4b5563; margin-top:.25rem; }
    .breath-phase { display:flex; gap:1rem; justify-content:center; margin-top:1rem; font-size:.7rem; color:#4b5563; }
    .breath-phase .on { color:#10b981; font-weight:600; }
    .breath-timer { font-size:2rem; font-weight:700; color:rgba(255,255,255,.06); margin-top:.35rem; letter-spacing:.02em; }

    /* === RESPONSIVE === */
    @media (max-width: 480px) {
      .page { padding: .75rem .75rem 5.5rem; }

      .sos-overlay .sos-text { font-size:1rem; padding:1.25rem; }
      .breath-circle { width:100px; height:100px; }

  </style>

    desc:"Le coeur est le centre spirituel de l'etre humain. Dans la tradition islamique, le Qalb est le siege de la foi (iman), de la sincerite (ikhlas) et de la connexion avec Allah ﷻ.\n\n═══ DIMENSIONS ═══\n• FOI (Iman) : La certitude interieure, la confiance en Allah, la conviction qui traverse les epreuves sans faiblir. Le croyant fort est plus aime d'Allah que le croyant faible.\n• GRATITUDE (Shukr) : Reconnaitre les bienfaits d'Allah, petits et grands. La gratitude transforme ce que nous avons en assez. 'Si vous etes reconnaissants, J'augmenterai Mes bienfaits sur vous.'\n• PARDON : Pardonner aux autres, c'est se liberer soi-meme. La rancune empoisonne le coeur. Le pardon est un cadeau que tu te fais a toi-meme.\n• GENEROSITE : Donner sans attendre en retour. La main qui donne est meilleure que la main qui recoit. La charite purifie le coeur.\n• CONNEXION : Le lien avec Allah ﷻ par la priere, le dhikr, le doua. 5 prieres par jour sont 5 rendez-vous avec ton Createur.\n\n═══ SIGNES DE DESEQUILIBRE ═══\n• Sentiment de vide interieur, meme en faisant beaucoup\n• Difficulte a ressentir de la joie ou de la gratitude\n• Rancunes accumulees, amertume\n• Jalousie, envie du bien des autres\n• Durete de coeur, insensibilite\n• Anxiete, angoisse existentielle\n\n═══ PRATIQUES CLES ═══\n• Chaque jour, note 3 choses pour lesquelles tu es reconnaissant\n• Fais une bonne action anonyme par semaine\n• Pardonne a quelqu'un dans ton coeur (meme s'il ne le sait pas)\n• Lis le Coran avec traduction chaque jour (meme 3 versets)\n• Fais un doua sincere pour quelqu'un d'autre\n• Pratique le dhikr : 33 SubhanAllah, 33 Al-hamdulillah, 33 Allahu Akbar\n\nUn coeur pur est comme un miroir : il reflete la lumiere divine sans la deformer. Quand le coeur est serein, le corps est detendu, l'esprit est clair, et le Nafs est apaise. Tout est connecte.\n\nPilier instable ? Pratique la gratitude quotidienne : chaque soir, ecris 3 bienfaits de ta journee, meme les plus simples." },
];

    </div>`:''}
    <h3 style="font-size:.95rem;font-weight:600;margin-bottom:.5rem">Missions du jour</h3>
    ${missions.map(m=>{const is=completed.includes(m.t);return `<div class="card" style="margin-bottom:.5rem;${is?'opacity:.5':''}"><div style="display:flex;justify-content:space-between;align-items:start;gap:.5rem"><div><span class="badge" style="font-size:.65rem;background:${m.p==='Djism'?'rgba(239,68,68,.15)':m.p==='Aql'?'rgba(59,130,246,.15)':m.p==='Nafs'?'rgba(245,158,11,.15)':'rgba(16,185,129,.15)'};color:${m.p==='Djism'?'#fca5a5':m.p==='Aql'?'#93c5fd':m.p==='Nafs'?'#fbbf24':'#34d399'}">${m.p}</span><div style="font-weight:600;font-size:.9rem;margin-top:.2rem">${m.t}</div><div style="font-size:.8rem;color:#6b7280">${m.d}</div></div><button class="btn btn-sm ${is?'btn-outline':'btn-primary'}" ${is?'disabled':''} onclick="compMission(${d},'${m.t}')">${is?'✅':'✓'}</button></div></div>`}).join('')}
    <div style="display:flex;justify-content:center;gap:.75rem;margin-top:1rem;padding:.5rem">
      <div style="text-align:center">
        <p style="font-size:.7rem;color:#6b7280;margin-bottom:.25rem">SOS</p>
        <button class="btn btn-danger btn-sm" onclick="triggerSos(${d})" style="border-radius:50%;width:44px;height:44px;font-size:1rem;padding:0">${sosCount>0?sosCount:'SOS'}</button>
        <p style="font-size:.65rem;color:#4b5563;margin-top:.2rem">${sosCount>0?'×'+sosCount:'Appel à la force'}</p>
      </div>
      <div style="text-align:center">
        <p style="font-size:.7rem;color:#6b7280;margin-bottom:.25rem">Progression</p>
        <div style="font-size:1.1rem;font-weight:700;color:#10b981">${totalDone}/120</div>
        <p style="font-size:.65rem;color:#4b5563;margin-top:.2rem">missions faites</p>
      </div>
    </div>`
}

function goDay(d){state.currentDay=d;save();renderProto()}
function activatePack(){state.packActive=true;state.currentDay=1;state.progress={};save();toast('✅ Protocole 30J activé !');nav('proto')}
function compMission(d,t){
  if(!state.progress[d])state.progress[d]={c:[]}
  if(!state.progress[d].c.includes(t))state.progress[d].c.push(t)
  state.currentDay=Math.max(state.currentDay,d);save();toast('✅ Mission accomplie ! 🎯');renderProto()
}
function markBrief(d){if(!state.progress[d])state.progress[d]={c:[]};state.progress[d].b=true;save();toast('✅ Briefing lu');renderProto()}
function triggerSos(d){
  if(!state.progress[d])state.progress[d]={c:[]};
  state.progress[d].s=(state.progress[d].s||0)+1;
  save();
  showSosOverlay(randomSos());
  renderProto()
}
function showSosOverlay(msg){
  var old=document.querySelector('.sos-overlay'); if(old) old.remove()
  var ov=document.createElement('div'); ov.className='sos-overlay'
  var hasSource=msg.indexOf(' - ') > -1
  var textPart = hasSource ? msg.split(' - ')[0] : msg
  var sourcePart = hasSource ? msg.split(' - ')[1] : ''
  ov.innerHTML='<button class="sos-close" onclick="document.querySelector(\'.sos-overlay\')?.remove()">✕</button><div style="text-align:center;margin-bottom:.5rem"><svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><circle cx="12" cy="16" r="0.5" fill="#ef4444"/></svg></div><div style="text-align:center;margin-bottom:1.5rem"><span style="font-size:.75rem;font-weight:600;letter-spacing:2px;color:#ef4444;text-transform:uppercase">SOS — Rappel de force</span></div><div id="sos-phase1" class="sos-text">'+textPart+(sourcePart?'<div class="sos-source">— '+sourcePart+'</div>':'')+'</div><div id="sos-phase2" style="display:none" class="breath-container"><div class="breath-circle" style="animation-duration:30s"><div class="breath-circle-inner">﷽</div></div><div id="breath-label" class="breath-label">Inspire...</div><div class="breath-sub">5 secondes</div><div class="breath-phase"><span id="bp-in" class="on">⬆ Inspire 5s</span><span id="bp-out">⬇ Expire 5s</span></div><div id="breath-count" class="breath-count">Cycle 1/3</div></div>'
  document.body.appendChild(ov)
  // Phase 1 : citation 4s, puis respiration
  setTimeout(function(){
    var p1=document.getElementById('sos-phase1'); if(p1)p1.style.display='none'
    var p2=document.getElementById('sos-phase2'); if(p2)p2.style.display='block'
    var label=document.getElementById('breath-label')
    if(!label||!p2) return
    var idx=0, cycle=0
    // Alterne Inspire/Expire toutes les 5s
    var breathTick=setInterval(function(){
      idx++
      if(idx%2==1){
        label.textContent='Expire...'; label.style.color='#93c5fd'
        document.getElementById('bp-in')?.classList.remove('on')
        document.getElementById('bp-out')?.classList.add('on')
        cycle++
        var cc=document.getElementById('breath-count')
        if(cc) cc.textContent='Cycle '+(cycle+1)+'/3'
      } else {
        label.textContent='Inspire...'; label.style.color='#10b981'
        document.getElementById('bp-in')?.classList.add('on')
        document.getElementById('bp-out')?.classList.remove('on')
      }
    }, 5000)
    // Timer 1seconde pour le compte à rebours
    var secLabel=label.nextElementSibling
    var breathSec=setInterval(function(){
      if(secLabel&&secLabel.className=='breath-sub'){
        var s=parseInt(secLabel.textContent)
        if(s>0) secLabel.textContent=s-1+' secondes'
        else secLabel.textContent='5 secondes'
      }
    }, 1000)
    // Fin après 30s
    setTimeout(function(){
      clearInterval(breathTick)
      clearInterval(breathSec)
      if(p2) p2.innerHTML='<div style="text-align:center;padding:1rem"><div style="font-size:1.2rem;font-weight:700;color:#34d399;margin-bottom:.5rem">Calme retrouvé 🤲</div><p style="font-size:.85rem;color:#6b7280;line-height:1.6">Prends ce calme avec toi.<br>Tu es plus fort que tu ne le crois.</p><button class="btn btn-primary btn-sm" style="margin-top:1rem" onclick="document.querySelector(\'.sos-overlay\')?.remove()">Continuer</button></div>'
    }, 30000)
  }, 4000)
  // Fermeture auto après 38s
  setTimeout(function(){
    var e=document.querySelector('.sos-overlay')
    if(e&&!e.querySelector('button[onclick*="Continuer"]')) e.remove()
  }, 38000)
}

// ========================== REPORT ==========================
function renderReport() {
  const el=document.getElementById('pc'); if(!el)return
  if(!state.scores||!state.packActive){el.innerHTML=`<div style="text-align:center;padding:2rem;color:#6b7280"><p>Fais d'abord le diagnostic et lance le protocole.</p><button class="btn btn-primary btn-sm" style="margin-top:.75rem" onclick="nav('diag')">Test diagnostic</button></div>`;return}
  let tm=0,td=0,ts=0
  for(let d=1;d<=30;d++){const g=state.progress[d];tm+=4;td+=g?.c?.length||0;ts+=g?.s||0}
  const r=tm>0?Math.round(td/tm*100):0
  el.innerHTML=`<h2 style="font-size:1.2rem;font-weight:700;text-align:center;margin:1rem 0;display:flex;align-items:center;justify-content:center;gap:.35rem">${ICONS.report}<span style="margin-left:.35rem">Rapport 30 jours</span></h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1rem">
      <div class="card" style="text-align:center"><div style="font-size:1.5rem;font-weight:700;color:#10b981">${td}</div><div style="font-size:.75rem;color:#6b7280">Missions sur ${tm}</div></div>
      <div class="card" style="text-align:center"><div style="font-size:1.5rem;font-weight:700;color:#fbbf24">${r}%</div><div style="font-size:.75rem;color:#6b7280">Complétion</div></div>
      <div class="card" style="text-align:center"><div style="font-size:1.5rem;font-weight:700;color:#fca5a5">${ts}</div><div style="font-size:.75rem;color:#6b7280">SOS utilisés</div></div>
      <div class="card" style="text-align:center"><div style="font-size:1.5rem;font-weight:700;color:#93c5fd">${Math.floor(td/4)}</div><div style="font-size:.75rem;color:#6b7280">Jours complétés</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem">${pCard('Djism','💪','#ef4444',state.scores.Djism)}${pCard('Aql','🧠','#3b82f6',state.scores.Aql)}${pCard('Nafs','🔥','#f59e0b',state.scores.Nafs)}${pCard('Qalb','💚','#10b981',state.scores.Qalb)}</div>
    <p style="text-align:center;font-size:.85rem;color:#6b7280;margin:1.5rem 0;line-height:1.6">"${state.user?.name}, 30 jours de travail sur toi-même.<br>Chaque pas comptait. Chaque effort avait du sens.<br>Qu'Allah bénisse ton chemin. 🤲"</p>
    <div style="text-align:center"><button class="btn btn-outline btn-sm" onclick="nav('home')">← Accueil</button></div>`
}

// ========================== INIT ==========================
state.scores=S('scores',null)
render()
</script>
</body></html>
